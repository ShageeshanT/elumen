<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="skyGlow" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#254D8F"/>
      <stop offset="45%" stop-color="#071B3E"/>
      <stop offset="100%" stop-color="#020611"/>
    </radialGradient>
    <radialGradient id="planet" cx="38%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#F0A38D"/>
      <stop offset="45%" stop-color="#B85668"/>
      <stop offset="100%" stop-color="#4B1F43"/>
    </radialGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFDDD2" stop-opacity=".75"/>
      <stop offset="100%" stop-color="#FF7E5F" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ground" x1="960" x2="960" y1="610" y2="1080" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5E6EAF"/>
      <stop offset=".42" stop-color="#293C77"/>
      <stop offset="1" stop-color="#0B1027"/>
    </linearGradient>
    <linearGradient id="mist" x1="960" x2="960" y1="770" y2="1080" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset=".68" stop-color="#FFFFFF" stop-opacity=".62"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <filter id="blur32" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="32"/>
    </filter>
    <filter id="blur18" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#000000" flood-opacity=".38"/>
    </filter>
    <style>
      .star { animation: twinkle 4s ease-in-out infinite; transform-origin: center; }
      .star:nth-of-type(2n) { animation-delay: 1.2s; }
      .star:nth-of-type(3n) { animation-delay: 2.4s; }
      .flora { animation: glow 3.8s ease-in-out infinite; }
      .flora:nth-of-type(2n) { animation-delay: 1.6s; }
      .float { animation: float 7s ease-in-out infinite; transform-origin: center; }
      @keyframes twinkle { 0%,100% { opacity: .28; transform: scale(.8); } 50% { opacity: .9; transform: scale(1.15); } }
      @keyframes glow { 0%,100% { opacity: .65; } 50% { opacity: 1; } }
      @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-14px); } }
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#skyGlow)"/>
